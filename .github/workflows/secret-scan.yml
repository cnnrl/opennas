name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gitleaks" version

      - name: Run Gitleaks (Repository Source)
        run: |
          set -euo pipefail
          CONFIG_ARGS=()
          if [[ -f .gitleaks.toml ]]; then
            CONFIG_ARGS=(--config .gitleaks.toml)
          fi

          # Scan current repository content instead of git revision ranges.
          # This avoids failures on force-push or rewritten history.
          gitleaks detect \
            --source . \
            --no-git \
            --redact \
            --exit-code 2 \
            --report-format sarif \
            --report-path results.sarif \
            "${CONFIG_ARGS[@]}"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
